{% extends "base.html" %}
{% block page_style %}
<style>
.test-result-page{
    padding: 18px 15px 30px;
}
.test-result-layout{
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
}
.test-result-main{
    flex: 1 1 760px;
}
.test-result-side{
    flex: 0 0 320px;
}
.test-result-card{
    border: 1px solid #dce8f1;
    border-radius: 4px;
    background: #fff;
    margin-bottom: 16px;
    padding: 16px 18px;
}
.test-result-card h3,
.test-result-card h4{
    margin-top: 0;
}
.test-result-meta{
    color: #666;
    margin-bottom: 12px;
}
.test-result-list{
    margin-bottom: 0;
    padding-left: 18px;
}
.test-result-field{
    border-top: 1px solid #eef3f7;
    padding: 12px 0;
}
.test-result-field:first-child{
    border-top: 0;
    padding-top: 0;
}
.test-result-field pre{
    margin-bottom: 0;
    white-space: pre-wrap;
    word-break: break-word;
}
.test-result-empty{
    color: #999;
}
.test-action-list{
    margin-bottom: 0;
    padding-left: 18px;
}
.test-action-list li{
    margin-bottom: 8px;
}
.test-action-group{
    border-top: 1px solid #eef3f7;
    margin-top: 12px;
    padding-top: 12px;
}
.test-action-group:first-child{
    border-top: 0;
    margin-top: 0;
    padding-top: 0;
}
.test-action-group .btn,
.test-action-group form{
    display: inline-block;
    margin-right: 8px;
    margin-bottom: 8px;
}
@media (max-width: 991px){
    .test-result-main,
    .test-result-side{
        flex-basis: 100%;
    }
}
</style>
{% endblock %}
{% block main_content %}
<div class="page-content test-result-page">
    {% include 'task/test_result_panel.html' %}
</div>
{% endblock %}
