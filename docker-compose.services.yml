services:
  mongodb:
    image: mongo:4.4
    container_name: zspider-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: mongopwd
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "127.0.0.1/admin", "-u", "mongoadmin", "-p", "mongopwd", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: zspider-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ./docker/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  memcached:
    image: memcached:1.6-alpine
    container_name: zspider-memcached
    restart: unless-stopped
    command: ["memcached", "-m", "128", "-p", "11211", "-u", "memcache", "-vv"]
    ports:
      - "${MEMCACHED_PORT:-11211}:11211"

volumes:
  mongodb_data:
  rabbitmq_data:
